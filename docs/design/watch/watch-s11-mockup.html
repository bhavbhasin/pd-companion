<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#ffffff}
.stage{width:640px;height:820px;background:radial-gradient(120% 90% at 50% 38%,#ffffff 60%,#eef1f4 100%);
  display:flex;align-items:center;justify-content:center}
/* device width == case width so side controls attach to the real case edge */
.device{position:relative;width:258px}
.device::after{content:'';position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);
  width:210px;height:40px;border-radius:50%;background:rgba(20,28,40,.20);filter:blur(20px);z-index:0}

/* ---- Kampa-blue sport band ---- */
.band{position:absolute;left:50%;transform:translateX(-50%);width:150px;z-index:1;
  background:linear-gradient(90deg,#2f5f9e 0%,#4a8cd6 20%,#6aa6e2 46%,#5a97da 56%,#3d78ba 82%,#2b568f 100%)}
.band::before{content:'';position:absolute;left:0;right:0;top:0;bottom:0;
  background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.32) 49%,transparent 62%)}
.band-top{top:-60px;height:128px;border-radius:34px 34px 14px 14px;
  -webkit-mask-image:linear-gradient(to top,#000 44%,transparent);mask-image:linear-gradient(to top,#000 44%,transparent)}
.band-bot{bottom:-60px;height:128px;border-radius:14px 14px 34px 34px;
  -webkit-mask-image:linear-gradient(to bottom,#000 40%,transparent);mask-image:linear-gradient(to bottom,#000 40%,transparent)}
.band-bot::after{content:'';position:absolute;left:12px;right:12px;top:52px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,transparent,rgba(0,0,0,.22),transparent)}

/* ---- side button: tucked BEHIND the case, only a sliver shows (z below case) ---- */
.button{position:absolute;z-index:2;right:-3px;top:56%;width:10px;height:46px;border-radius:5px;
  background:linear-gradient(90deg,#9a9da2,#c4c7cb 55%,#83868b);box-shadow:0 1px 2px rgba(0,0,0,.35)}

/* ---- aluminium case (covers the button's inner half) ---- */
.case{position:relative;z-index:3;width:258px;aspect-ratio:416/496;border-radius:74px;padding:7px;
  background:linear-gradient(135deg,#fbfcfd 0%,#d7dade 26%,#aeb2b8 52%,#c6c9ce 70%,#8f9298 100%);
  box-shadow:0 0 0 1px rgba(0,0,0,.30),inset 0 1px 2px rgba(255,255,255,.85),inset 0 -2px 3px rgba(0,0,0,.28),
    0 30px 60px rgba(20,28,40,.32)}
.glass{position:relative;width:100%;height:100%;border-radius:64px;padding:9px;background:#000;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.glass img{width:100%;height:100%;object-fit:cover;display:block;border-radius:56px;background:#000}
.gloss{position:absolute;inset:9px;border-radius:56px;pointer-events:none;
  background:linear-gradient(128deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.05) 18%,transparent 40%)}

/* ---- Digital Crown: base flush to case edge (slight overlap), knob protrudes, z above case ---- */
.crown{position:absolute;z-index:4;right:-15px;top:32%;width:14px;height:42px;border-radius:6px;
  background:linear-gradient(90deg,#83868b,#d3d5d8 42%,#f0f1f3 56%,#a4a6aa 76%,#6b6d71);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.18),1px 1px 3px rgba(0,0,0,.4)}
.crown::after{content:'';position:absolute;inset:6px 3px;border-radius:3px;
  background:repeating-linear-gradient(#000 0 1px,transparent 1px 3px);opacity:.22}
</style></head><body><div class="stage"><div class="device">
