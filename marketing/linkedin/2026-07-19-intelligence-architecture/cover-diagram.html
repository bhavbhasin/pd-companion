<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:'Geist';src:url('file:///Users/bhav/Documents/ParkinsonsProject/PD Companion/PD Companion/Fonts/Geist-Regular.ttf') format('truetype');font-weight:400}
@font-face{font-family:'Geist';src:url('file:///Users/bhav/Documents/ParkinsonsProject/PD Companion/PD Companion/Fonts/Geist-Medium.ttf') format('truetype');font-weight:500}
@font-face{font-family:'Geist';src:url('file:///Users/bhav/Documents/ParkinsonsProject/PD Companion/PD Companion/Fonts/Geist-SemiBold.ttf') format('truetype');font-weight:600}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;background:#0a0a0a;font-family:'Geist',sans-serif;overflow:hidden}

.stage{position:relative;width:1280px;height:720px;
  background:
    radial-gradient(60% 70% at 50% 10%, rgba(74,140,214,.16) 0%, rgba(74,140,214,0) 60%),
    radial-gradient(80% 60% at 50% 100%, rgba(74,140,214,.08) 0%, rgba(10,10,10,0) 55%),
    #0a0a0a;
}

/* subtle grid texture */
.grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:64px 64px;
  -webkit-mask-image:radial-gradient(72% 72% at 50% 52%,#000 40%,transparent 85%);
          mask-image:radial-gradient(72% 72% at 50% 52%,#000 40%,transparent 85%);
}

/* brand lockup, top-left */
.brand{position:absolute;top:46px;left:60px;display:flex;align-items:center;gap:10px}
.brand svg{width:34px;height:20px}
.brand .word{font-family:'Geist';font-weight:500;font-size:22px;letter-spacing:-0.02em;color:#f5f6f7}
.brand .word b{color:#4A8CD6;font-weight:500}

/* centered title */
.title{position:absolute;top:112px;left:0;right:0;text-align:center}
.title h1{font-family:'Geist';font-weight:600;font-size:36px;letter-spacing:-0.01em;color:#f5f6f7}
.title .rule{width:64px;height:3px;border-radius:2px;margin:18px auto 0;background:#4A8CD6}

/* flow row */
.flow{position:absolute;top:236px;left:0;right:0;height:400px;
  display:flex;align-items:center;justify-content:center;gap:0}

.card{width:312px;height:322px;border-radius:30px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:0 28px;position:relative}

.card.ghost{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10)}
.card.judge{width:344px;height:360px;
  background:linear-gradient(160deg,#4A8CD6 0%,#3a6fae 100%);
  box-shadow:0 0 0 1px rgba(74,140,214,.55), 0 34px 80px -10px rgba(74,140,214,.55), 0 0 100px rgba(74,140,214,.28);
}

.tag{font-family:'Geist';font-weight:600;font-size:12px;letter-spacing:.13em;text-transform:uppercase;
  margin-bottom:18px;opacity:.85}
.card.ghost .tag{color:#8b8f96}
.card.judge .tag{color:rgba(255,255,255,.85)}

.icon{width:56px;height:56px;border-radius:17px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.card.ghost .icon{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
.card.judge .icon{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.30)}
.icon svg{width:27px;height:27px}

.role{font-family:'Geist';font-weight:600;font-size:29px;letter-spacing:-0.01em;margin-bottom:12px}
.card.ghost .role{color:#f0f1f2}
.card.judge .role{color:#ffffff}

.desc{font-family:'Geist';font-weight:400;font-size:16.5px;line-height:1.45}
.card.ghost .desc{color:#9a9ea5}
.card.judge .desc{color:rgba(255,255,255,.94)}

.who{font-family:'Geist';font-weight:500;font-size:13px;letter-spacing:.03em;margin-top:20px;
  padding:7px 15px;border-radius:20px}
.card.ghost .who{color:#7f8cbb;background:rgba(110,140,220,.12);border:1px solid rgba(110,140,220,.22)}
.card.judge .who{color:#1c3a63;background:rgba(255,255,255,.92)}

.arrow{width:64px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.arrow svg{width:46px;height:20px}
</style></head>
<body>
<div class="stage">
  <div class="grid"></div>

  <div class="brand">
    <svg viewBox="0 0 240 144" fill="none"><path d="M8 90 C 28 90, 30 30, 56 30 C 78 30, 80 110, 104 95 C 124 82, 126 60, 150 60 C 168 60, 172 78, 192 78 L 232 78" stroke="#4A8CD6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/><circle cx="232" cy="78" r="9" fill="#4A8CD6"/></svg>
    <div class="word">k<b>ā</b>mpa</div>
  </div>

  <div class="title">
    <h1>Insight Architecture</h1>
    <div class="rule"></div>
  </div>

  <div class="flow">
    <div class="card ghost">
      <div class="tag">Layer 1</div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.5.4.8 1 .8 1.7v.5h5.6v-.5c0-.7.3-1.3.8-1.7A6 6 0 0 0 12 3z" stroke="#9db2e0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="role">Propose</div>
      <div class="desc">Suggests hypotheses<br>worth testing</div>
      <div class="who">AI · imagination</div>
    </div>

    <div class="arrow"><svg viewBox="0 0 46 20" fill="none"><path d="M0 10h38M30 3l8 7-8 7" stroke="#4A8CD6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

    <div class="card judge">
      <div class="tag">Layer 2</div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v5c0 4.5-3 7.7-7 10-4-2.3-7-5.5-7-10V6l7-3z" stroke="#ffffff" stroke-width="1.7" stroke-linejoin="round"/><path d="M9 12.2l2 2 4-4.4" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="role">Judge</div>
      <div class="desc">The only step that may<br>ever call a pattern real</div>
      <div class="who">Deterministic · on-device</div>
    </div>

    <div class="arrow"><svg viewBox="0 0 46 20" fill="none"><path d="M0 10h38M30 3l8 7-8 7" stroke="#4A8CD6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

    <div class="card ghost">
      <div class="tag">Layer 3</div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v10H9l-4 4V5z" stroke="#9db2e0" stroke-width="1.6" stroke-linejoin="round"/></svg></div>
      <div class="role">Narrate</div>
      <div class="desc">Explains the survivor<br>in plain words</div>
      <div class="who">AI · voice</div>
    </div>
  </div>
</div>
</body></html>
